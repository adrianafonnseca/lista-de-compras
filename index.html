<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nossa Lista de Compras 🛒</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #e0eaff 0%, #fce4f3 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 3rem;
    }

    .container { width: 100%; max-width: 480px; }

    .header { text-align: center; margin-bottom: 2rem; }
    .header .emoji { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
    .header h1 {
      font-size: 2rem; font-weight: 800;
      background: linear-gradient(90deg, #3b82f6, #a855f7, #ec4899);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 0.35rem;
    }
    .header p { font-size: 0.95rem; color: #6b7280; }

    .card {
      background: #fff; border-radius: 24px; padding: 2rem 1.75rem;
      box-shadow: 0 8px 32px rgba(59,130,246,.10), 0 2px 8px rgba(236,72,153,.08);
      margin-bottom: 1.5rem;
    }

    .field { margin-bottom: 1.25rem; }
    .field label {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.8rem; font-weight: 700; color: #6b7280;
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.45rem;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-blue   { background: #3b82f6; }
    .dot-pink   { background: #ec4899; }
    .dot-purple { background: #a855f7; }

    .field input, .field textarea {
      width: 100%; border: 1.5px solid #e5e7eb; border-radius: 12px;
      padding: 0.7rem 1rem; font-family: 'Nunito', sans-serif; font-size: 1rem;
      color: #1f2937; background: #f9fafb; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus, .field textarea:focus {
      border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); background: #fff;
    }
    .field textarea { resize: vertical; min-height: 90px; }

    .btn {
      width: 100%; padding: 0.9rem; border: none; border-radius: 14px;
      font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 800; cursor: pointer;
      background: linear-gradient(135deg, #3b82f6 0%, #a855f7 50%, #ec4899 100%);
      color: #fff; margin-top: 0.5rem; transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover  { opacity: 0.9; transform: scale(1.01); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .msg {
      margin-top: 1rem; padding: 0.75rem 1rem; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; text-align: center; display: none;
    }
    .msg.success { background: #d1fae5; color: #065f46; display: block; }
    .msg.error   { background: #fee2e2; color: #991b1b; display: block; }

    /* Lista de itens */
    .lista-card {
      background: #fff; border-radius: 24px; padding: 1.75rem;
      box-shadow: 0 8px 32px rgba(59,130,246,.10), 0 2px 8px rgba(236,72,153,.08);
    }

    .lista-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .lista-titulo {
      font-size: 1.1rem; font-weight: 800; color: #1f2937;
    }
    .badge {
      background: linear-gradient(135deg, #3b82f6, #ec4899);
      color: #fff; font-size: 0.75rem; font-weight: 800;
      padding: 0.2rem 0.65rem; border-radius: 99px;
    }

    .btn-whats {
      width: 100%; padding: 0.8rem; border: none; border-radius: 14px;
      font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
      cursor: pointer; background: #25d366; color: #fff;
      margin-bottom: 1.25rem; transition: opacity 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-whats:hover  { opacity: 0.9; transform: scale(1.01); }
    .btn-whats:active { transform: scale(0.98); }

    .lista-vazia {
      text-align: center; color: #9ca3af; font-size: 0.95rem; padding: 1.5rem 0;
    }

    .item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 0.85rem 0; border-bottom: 1px solid #f3f4f6;
      transition: opacity 0.2s;
    }
    .item:last-child { border-bottom: none; }

    .item-check {
      width: 22px; height: 22px; border-radius: 6px;
      border: 2px solid #d1d5db; background: #fff;
      cursor: pointer; flex-shrink: 0; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .item-check.checked { background: #a855f7; border-color: #a855f7; }
    .item-check.checked::after { content: "✓"; color: #fff; font-size: 13px; font-weight: 800; }

    .item-info { flex: 1; }
    .item-nome {
      font-size: 1rem; font-weight: 700; color: #1f2937;
      transition: color 0.2s, text-decoration 0.2s;
    }
    .item-detalhes { font-size: 0.82rem; color: #6b7280; margin-top: 2px; }

    .item.comprado .item-nome {
      text-decoration: line-through; color: #9ca3af;
    }
    .item.comprado .item-detalhes { color: #c4c8cf; }
    .item.comprado { opacity: 0.6; }

    .footer {
      text-align: center; margin-top: 1.5rem;
      font-size: 0.82rem; color: #9ca3af;
    }
    .footer span { color: #ec4899; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="emoji">🛒</span>
      <h1>Nossa Lista de Compras</h1>
      <p>Adicione um item para o casal conferir</p>
    </div>

    <!-- Formulário -->
    <div class="card">
      <div class="field">
        <label><span class="dot dot-blue"></span>Produto</label>
        <input type="text" id="produto" placeholder="Ex: Leite integral, Arroz 5kg…" />
      </div>
      <div class="field">
        <label><span class="dot dot-pink"></span>Quantidade</label>
        <input type="text" id="quantidade" placeholder="Ex: 2 unidades, 1 pacote…" />
      </div>
      <div class="field">
        <label><span class="dot dot-purple"></span>Observação</label>
        <textarea id="observacao" placeholder="Ex: Comprar na promoção, marca preferida…"></textarea>
      </div>
      <button class="btn" id="btn-enviar" onclick="enviar()">✨ Adicionar à lista</button>
      <div class="msg" id="msg"></div>
    </div>

    <!-- Lista -->
    <div class="lista-card">
      <div class="lista-header">
        <span class="lista-titulo">📋 Itens da lista</span>
        <span class="badge" id="badge-count">0 itens</span>
      </div>

      <button class="btn-whats" onclick="enviarWhatsApp()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.136.563 4.14 1.534 5.876L0 24l6.335-1.652A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.882a9.875 9.875 0 01-5.031-1.378l-.361-.214-3.741.976.999-3.648-.235-.374A9.861 9.861 0 012.118 12C2.118 6.533 6.533 2.118 12 2.118S21.882 6.533 21.882 12 17.467 21.882 12 21.882z"/>
        </svg>
        Enviar lista pelo WhatsApp
      </button>

      <div id="lista-itens">
        <div class="lista-vazia">Nenhum item na lista ainda 🛍️</div>
      </div>
    </div>

    <p class="footer">Feito com <span>♥</span> para vocês dois</p>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxj2Jh-vrl9K_QLqISiboTdPqTajVeZ1_p1spfkw5DmgnSGdIciTM0cwmTJIM-5exj9/exec";

    let itens = JSON.parse(localStorage.getItem("lista-compras") || "[]");

    function salvar() {
      localStorage.setItem("lista-compras", JSON.stringify(itens));
    }

    function renderizar() {
      const container = document.getElementById("lista-itens");
      const badge = document.getElementById("badge-count");
      const pendentes = itens.filter(i => !i.comprado).length;

      badge.textContent = pendentes + (pendentes === 1 ? " item" : " itens");

      if (itens.length === 0) {
        container.innerHTML = '<div class="lista-vazia">Nenhum item na lista ainda 🛍️</div>';
        return;
      }

      container.innerHTML = itens.map((item, idx) => `
        <div class="item ${item.comprado ? 'comprado' : ''}" id="item-${idx}">
          <div class="item-check ${item.comprado ? 'checked' : ''}" onclick="toggleItem(${idx})"></div>
          <div class="item-info">
            <div class="item-nome">${item.produto}</div>
            <div class="item-detalhes">
              ${item.quantidade ? '📦 ' + item.quantidade : ''}
              ${item.quantidade && item.observacao ? ' · ' : ''}
              ${item.observacao ? '📝 ' + item.observacao : ''}
            </div>
          </div>
        </div>
      `).join("");
    }

    function toggleItem(idx) {
      itens[idx].comprado = !itens[idx].comprado;
      salvar();
      renderizar();
    }

    function enviarWhatsApp() {
      const pendentes = itens.filter(i => !i.comprado);
      if (pendentes.length === 0) {
        alert("Não há itens pendentes na lista!");
        return;
      }
      let texto = "🛒 *Lista de Compras*\n\n";
      pendentes.forEach(item => {
        texto += `• ${item.produto}`;
        if (item.quantidade) texto += ` - ${item.quantidade}`;
        if (item.observacao) texto += ` (${item.observacao})`;
        texto += "\n";
      });
      const url = "https://wa.me/?text=" + encodeURIComponent(texto);
      window.open(url, "_blank");
    }

    async function enviar() {
      const produto    = document.getElementById("produto").value.trim();
      const quantidade = document.getElementById("quantidade").value.trim();
      const observacao = document.getElementById("observacao").value.trim();
      const btn        = document.getElementById("btn-enviar");
      const msg        = document.getElementById("msg");

      if (!produto) {
        mostrarMsg("Por favor, preencha o nome do produto.", "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Enviando…";
      msg.className = "msg";
      msg.style.display = "none";

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ produto, quantidade, observacao })
        });

        itens.push({ produto, quantidade, observacao, comprado: false });
        salvar();
        renderizar();

        mostrarMsg("✅ Item adicionado à lista com sucesso!", "success");
        document.getElementById("produto").value    = "";
        document.getElementById("quantidade").value = "";
        document.getElementById("observacao").value = "";
      } catch (e) {
        mostrarMsg("Erro ao enviar. Verifique sua conexão.", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "✨ Adicionar à lista";
      }
    }

    function mostrarMsg(texto, tipo) {
      const msg = document.getElementById("msg");
      msg.textContent = texto;
      msg.className = "msg " + tipo;
    }

    renderizar();
  </script>
</body>
</html>
